<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — NLP LeetCode</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          bg: '#0F172A', panel: '#111a2e', surface: '#1E293B', border: '#1f2a44',
          muted: '#94a3b8', text: '#F8FAFC', brand: '#22C55E',
          hard: '#EF4444',
        },
        fontFamily: {
          sans: ['IBM Plex Sans', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="flex min-h-screen flex-col bg-bg font-sans text-text antialiased">
  <header class="border-b border-border/60">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <a href="index.html" class="flex items-center gap-2">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-md bg-brand/15 text-brand">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </span>
        <span class="font-mono text-lg font-semibold tracking-tight">NLP<span class="text-brand">.</span>Code</span>
      </a>
      <a href="register.html" class="text-sm text-muted transition-colors hover:text-text">Create account →</a>
    </div>
  </header>

  <main class="flex flex-1 items-center justify-center px-6 py-10">
    <div class="w-full max-w-md">
      <div class="rounded-xl border border-border bg-panel p-8 shadow-[0_0_0_1px_rgba(34,197,94,0.06)]">
        <div class="mb-6 text-center">
          <h1 class="font-mono text-2xl font-semibold tracking-tight">Welcome back</h1>
          <p class="mt-1 text-sm text-muted">Đăng nhập để sync tiến độ luyện bài.</p>
        </div>

        <form id="login-form" class="space-y-4" novalidate>
          <div>
            <label for="email" class="mb-1.5 block text-sm font-medium text-text">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" class="h-10 w-full rounded-md border border-border bg-surface/60 px-3 text-sm text-text placeholder:text-muted/70 focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="you@example.com" />
          </div>
          <div>
            <label for="password" class="mb-1.5 block text-sm font-medium text-text">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" minlength="6" class="h-10 w-full rounded-md border border-border bg-surface/60 px-3 text-sm text-text placeholder:text-muted/70 focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="••••••••" />
          </div>

          <div id="form-error" class="hidden rounded-md border border-hard/30 bg-hard/10 px-3 py-2 text-sm text-hard" role="alert"></div>

          <button id="submit-btn" type="submit" class="inline-flex h-11 w-full cursor-pointer items-center justify-center gap-2 rounded-md bg-brand text-sm font-semibold text-slate-950 transition-colors hover:bg-brand/90 disabled:cursor-not-allowed disabled:opacity-60">
            <span class="btn-label">Sign in</span>
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-muted">
          Chưa có tài khoản?
          <a href="register.html" class="font-medium text-brand hover:underline">Đăng ký</a>
        </p>
      </div>
      <p class="mt-4 text-center text-xs text-muted">Dữ liệu lưu trên backend FastAPI (SQLite).</p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth-page.js"></script>
</body>
</html>
